timezone: Asia/Shanghai

brand:
  name: "交易 Agent 实验室"

canvas:
  width: 1080
  height: 1440
  margin: 88
  # 内容页左侧正文阅读列宽度；右侧保留给系统化设计元素。
  content_width: 620
  cover_title_width: 760
  bullet_font_size: 34
  # AI 背景只做轻微柔化，再与本地排版合成；数值越低，AI 视觉越明显。
  ai_background_blur: 1
  ai_background_blend: 0.29
  ai_background_color: 0.88
  ai_background_contrast: 1.16
  ai_subject_alpha: 238
  ai_subject_top_clean: 166
  ai_subject_top_fade: 180
  cover_ai_visible_start: 0.46
  cover_ai_solid_start: 0.62
  content_ai_visible_start: 0.54
  content_ai_solid_start: 0.68

colors:
  background: "#F7F7F5"
  text: "#111111"
  muted: "#666B73"
  accent: "#1F6FFF"
  hairline: "#DADDE2"
  grid: "#ECEEF2"
  ghost: "#E8EBF0"

font:
  # 按顺序查找。macOS 默认优先用 PingFang；Linux 可换成 Noto Sans CJK。
  regular:
    - "/System/Library/Fonts/PingFang.ttc"
    - "/System/Library/Fonts/Hiragino Sans GB.ttc"
    - "/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc"
  bold:
    - "/System/Library/Fonts/PingFang.ttc"
    - "/System/Library/Fonts/Hiragino Sans GB.ttc"
    - "/usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc"

image_model:
  # 默认使用 Vertex AI / Gemini 图像模型生成无文字背景；
  # 文字仍由 Pillow 本地排版，保证中文内容准确。
  enabled: true
  provider: vertex_gemini
  # Nano Banana 2 / Gemini 3.1 Flash Image
  model: gemini-3.1-flash-image
  project: gen-lang-client-0729475539
  location: global
  api_version: v1
  api_key_env: GOOGLE_API_KEY
  # 拉大请求间隔，躲开图像模型「每分钟请求数」瞬时上限（429）。
  request_interval_seconds: 20
  quota_retry_attempts: 2
  quota_retry_seconds: 75
  # 撞 IMAGE_RECITATION（版权复述安全过滤、不出图也不扣费）时，
  # 自动给 prompt 追加「更抽象、更原创」的提示并重试的总次数。
  recitation_retry_attempts: 3
  # --direct-ai-card 模式默认套用的视觉风格模板（见下方 style_presets）。
  # 不指定 --style 且选题没匹配到关键词时，回退到这一套。
  default_style: magazine_editorial
  # 先重点提高封面稳定性；内容页如需更高审美稳定性，可改成 2。
  cover_candidates_per_card: 2
  content_candidates_per_card: 1
  # 如果你要用完整 Vertex AI 身份认证，设置环境变量：
  # export GOOGLE_CLOUD_PROJECT="你的 GCP 项目 ID"
  # export GOOGLE_CLOUD_LOCATION="global"
  # gcloud auth application-default login
  #
  # 如果你用的是 Vertex AI Express / API Key，设置：
  # export GOOGLE_API_KEY="你的 Vertex/Gemini API Key"
  #
  # 可选 provider:
  # - vertex_gemini: Gemini 图像模型，默认推荐
  # - vertex_imagen: Imagen 4，需把 model 改成 imagen-4.0-generate-001 等
  # - openai: 兼容旧配置，需 OPENAI_API_KEY 和 openai 包

# 视觉风格模板（仅 --direct-ai-card 模式生效）。
# 决定卡片「长什么样」（配色 / 排版 / 隐喻取向），与 style_director 的领域主题正交。
# 用 --style <key> 手动指定；不指定时按 match_keywords 自动选，无命中用 image_model.default_style。
style_presets:
  magazine_editorial:
    name: "杂志编辑精致"
    match_keywords: ["复盘", "研究", "判断", "方法", "系统", "笔记", "观点", "原则"]
    palette:
      paper: "#F3EFE6"
      ink: "#1C1B19"
      accent: "#1F4E3D"
      support: "#9A8F7D"
    typography: "强字体层级：超大号高质感标题、克制的小号正文、清晰的页码与栏目小字；字距讲究、对齐到网格。"
    art_direction: "高级杂志编辑版式：基线网格、大边距留白、分栏结构、哑光纸印刷质感、细分隔线；配色克制有质感（米白纸 + 油墨黑 + 一个墨绿强调色），不要黑白灰加科技蓝。主视觉是优雅的编辑式静物或抽象印刷构成，不要办公纸堆、文件夹、档案袋、桌面证据线那一套。"
  bold_xhs:
    name: "小红书爆款封面"
    match_keywords: ["千万别", "后悔", "避坑", "真相", "一定要", "终于", "震惊"]
    palette:
      paper: "#FBF3E4"
      ink: "#171513"
      accent: "#E2452F"
      support: "#1F4E3D"
    typography: "超大号标题撑满视觉、关键词高亮或描边、强对比；标题一眼读完，信息层级分明。"
    art_direction: "小红书信息流爆款封面：大面积高饱和撞色色块背景、超大冲击力标题、极强对比、留白少而有张力，第一眼跳出来。用扁平矢量、几何色块或简洁图形符号表达，干净现代有设计感。明确不要手绘线描、不要复古做旧插画、不要写实素描、不要满幅细密插画。一个鲜明主体或符号即可。"
  warm_editorial:
    name: "暖色编辑"
    match_keywords: ["生活", "习惯", "情绪", "成长", "陪伴", "温柔", "心态"]
    palette:
      paper: "#F2E7D5"
      ink: "#33291E"
      accent: "#C0673A"
      support: "#7A8C6B"
    typography: "温润的字体层级，标题有手感、正文舒朗，不要冷硬几何。"
    art_direction: "暖色编辑插画风：暖米与赭石色调、柔和光影、手绘或插画质感的人性化画面，有温度有生活气，不要冷硬科技感、不要纯几何性冷淡。"
  signature_mono:
    name: "极简科技蓝"
    match_keywords: []
    palette:
      paper: "#F7F7F5"
      ink: "#111111"
      accent: "#1F6FFF"
      support: "#666B73"
    typography: "克制的字体层级，标题有冲击但不过大，正文不像口号。"
    art_direction: "黑、白、灰为主，科技蓝只做点睛。不要满屏蓝线、不要大面积霓虹、不要赛博感。允许纸张、档案、桌面、透明界面、工具、门、天平、证据线、留痕轨迹等元素，但必须服务于本页观点。"
  guochao:
    name: "国潮东方"
    match_keywords: ["国风", "东方", "传统", "中式"]
    palette:
      paper: "#F2E9D8"
      ink: "#1A1A1A"
      accent: "#C8453B"
      support: "#1F4E5F"
    typography: "标题端庄有力，可带书法感或宋体气质；层级清楚、留白讲究。"
    art_direction: "新中式国潮美学：朱红、靛蓝、描金点缀，传统纹样、山水、器物的现代极简化表达，东方留白与构图。扁平或半立体，不要廉价喜庆、不要密集花纹堆砌、不要写实照片。"
  minimal_ins:
    name: "极简 ins"
    match_keywords: ["极简", "留白", "高级"]
    palette:
      paper: "#F4F2EE"
      ink: "#2B2B2B"
      accent: "#B7A98B"
      support: "#C9C2B6"
    typography: "大量留白、细字重、精致小字，标题不喧哗，性冷淡高级感。"
    art_direction: "Instagram 极简美学：大面积留白、莫兰迪低饱和配色、一个简洁主体、细线条与柔和阴影，克制、干净、呼吸感强。不要满版元素、不要高饱和、不要复杂插画。"
  soft_3d:
    name: "柔和 3D"
    match_keywords: ["可爱", "立体", "卡通"]
    palette:
      paper: "#F0EEF7"
      ink: "#2A2740"
      accent: "#7C6BF0"
      support: "#F0A6C2"
    typography: "圆润字体、明确层级，标题有体积感但清晰。"
    art_direction: "柔和 3D 渲染风：奶油质感的立体物件、圆角几何、柔光与柔和投影、低对比马卡龙配色，可爱现代有体积感。不要硬边写实、不要金属冷硬、不要手绘线描。"
  film_photo:
    name: "胶片摄影"
    match_keywords: ["生活", "故事", "记录", "日常"]
    palette:
      paper: "#E8E2D6"
      ink: "#26221C"
      accent: "#B5623A"
      support: "#6E7361"
    typography: "标题简洁，像杂志大片标注，字号克制、留白多。"
    art_direction: "胶片摄影质感：写实场景或静物、自然光影、轻微胶片颗粒与复古暖调、浅景深。像一张有故事感的生活照，不要插画、不要矢量、不要塑料感 3D。"

  # ===== A 组：真实 · 情绪 · 共鸣（要让人代入"这就是我"，而不是解码抽象符号）=====
  authentic_moment:
    name: "真实人物·情绪瞬间"
    match_keywords: ["亏", "爆仓", "崩溃", "释然", "挣扎", "后悔", "孤独", "情绪", "真实", "经历", "那一刻", "终于"]
    palette:
      paper: "#EDE7DD"
      ink: "#211C17"
      accent: "#B5482F"
      support: "#7A6A55"
    typography: "标题像纪录片字幕，克制有重量；字号中等不喧哗，留白留给情绪。"
    art_direction: "真实纪实摄影：画面里必须有真实的人——可以是背影、侧脸、手部或局部，处在真实场景中的一个有情绪的瞬间（疲惫、释然、专注、犹豫、如释重负）。自然光、真实质感、轻微不完美与颗粒，像抓拍的生活照而不是摆拍。第一眼让人代入“这就是我”。明确不要：抽象符号静物（钥匙/天平/齿轮/锚/羽毛）、完美对称的高级摆拍、空无一人的纯物件。"
  pov_slice:
    name: "第一人称POV·生活切片"
    match_keywords: ["复盘", "日常", "记录", "每天", "习惯", "桌面", "我的一天", "手机", "屏幕"]
    palette:
      paper: "#E9E4DB"
      ink: "#262019"
      accent: "#3A6B5B"
      support: "#8A7F6E"
    typography: "标题像随手记下的一句话，自然、口语、有呼吸。"
    art_direction: "第一人称视角（POV）生活切片：从“我”的眼睛看出去——自己的手、手机屏幕、键盘、桌面、窗边、走路时的脚下。自然光、真实环境、有生活痕迹，强烈代入感。不要第三人称全景、不要抽象符号摆拍、不要完美布景。"
  midnight_mono:
    name: "深夜独白·暗调情绪"
    match_keywords: ["深夜", "焦虑", "低谷", "失眠", "撑不住", "迷茫", "崩溃", "压力", "凌晨"]
    palette:
      paper: "#15171C"
      ink: "#EDEAE3"
      accent: "#D98A4E"
      support: "#5A6168"
    typography: "暗底浅字，标题安静有力，像深夜写下的独白。"
    art_direction: "深夜暗调情绪：低照度场景，大面积暗部，一束光源（屏幕冷光、台灯、窗外路灯）打在人或物上，孤独、内省、克制的张力，可以有人的剪影或局部。情绪优先于信息。不要明亮、不要高饱和、不要热闹喧哗。"
  handwritten_journal:
    name: "治愈手账·手写温度"
    match_keywords: ["成长", "陪伴", "治愈", "小确幸", "温柔", "心态", "手账", "慢下来"]
    palette:
      paper: "#F4EEE1"
      ink: "#3B3228"
      accent: "#C77E4D"
      support: "#8FA07C"
    typography: "像手写手账：标题可带手写感，亲切、有温度，不冷硬。"
    art_direction: "治愈系手账风：纸张、手写字迹质感、便签、胶带、小贴纸、干花、咖啡渍等有温度的元素，暖光柔和，像翻开某人真实的手帐本。有人味、不完美、亲切。不要冷硬几何、不要科技感、不要塑料 3D。"
  retro_film:
    name: "胶片做旧·怀旧叙事"
    match_keywords: ["回忆", "曾经", "那年", "转折", "怀念", "多年后", "当初", "后来"]
    palette:
      paper: "#E5DCC9"
      ink: "#2C251C"
      accent: "#A8623A"
      support: "#6E6651"
    typography: "标题像老照片背面的题字，有年代感、克制。"
    art_direction: "胶片做旧怀旧叙事：颗粒、漏光、褪色复古色调，像翻出的老照片或旧胶卷的一帧，有时间感和故事感，可以有人、有场景，温暖怀旧。不要清晰锐利的现代感、不要高饱和、不要矢量扁平。"
  real_workspace:
    name: "真实工作现场·纪实照片"
    match_keywords: ["vibecoding", "搭建", "手搓", "做了个", "做了一个", "开发", "代码", "屏幕", "工作台", "现场", "Agent", "系统"]
    palette:
      paper: "#1A1C20"
      ink: "#ECECEC"
      accent: "#4C8DFF"
      support: "#7A8290"
    typography: "标题像随手记，叠在照片上方或角落的留白处，克制、不抢画面。"
    art_direction: "真实纪实摄影，像用手机或微单随手拍的真实工作现场：真实的桌面、一两块亮着的屏幕（代码编辑器、图表/仪表盘界面，虚化处理、不要清晰可读的文字或伪文字）、机械键盘、敲键盘的手或局部人物、马克杯、缠绕的线材，暗房环境 + 屏幕冷光或暖色台灯，浅景深、自然颗粒、轻微凌乱和不完美，强烈的 build in public / “我真的把它做出来了” 的真实感与代入感。明确不要：插画、3D、扁平矢量、棚拍式完美摆拍、抽象符号静物。"

# 文本创意层（可选）：用 DeepSeek 等文本大模型为每页创意生成「视觉 brief」
# （隐喻 + 构图重点 + 细节 + 配色侧重），再喂给图像模型。仅 --direct-ai-card 生效。
# 关闭时、或调用失败/输出不合格时，自动回退 style_director 的规则隐喻库。
creative_llm:
  enabled: true             # 已启用：需 export DEEPSEEK_API_KEY；无 key 时自动回退规则库
  provider: deepseek
  base_url: "https://api.deepseek.com"
  model: "deepseek-v4-pro"  # DeepSeek V4 Pro
  api_key_env: DEEPSEEK_API_KEY
  timeout_seconds: 60
  temperature: 0.9

# 文本文案层（可选）：用 DeepSeek 等文本大模型生成「卡片文案」和「图文正文」，
# 让系统不再绑定单一题材，由本次选题/素材驱动。关闭、无 key、或调用失败/输出不合格时，
# 自动回退 copy_pipeline / content_writer 的规则模板。删掉本段时复用上面的 creative_llm 设置。
copy_llm:
  enabled: true             # 需 export DEEPSEEK_API_KEY；无 key 时自动回退规则模板
  provider: deepseek
  base_url: "https://api.deepseek.com"
  model: "deepseek-v4-pro"
  api_key_env: DEEPSEEK_API_KEY
  timeout_seconds: 60
  temperature: 0.8

# Telegram 自动推送：生成发布包后把图文推到手机（纯发送，不影响别的 bot 接收）。
# 凭据走环境变量，不要写进项目文件：
#   export TELEGRAM_BOT_TOKEN="bot token"
#   export TELEGRAM_CHAT_ID="你的 chat_id"
# 没设凭据时自动跳过；单次想关掉用 main.py --no-push。
telegram:
  enabled: true
  bot_token_env: TELEGRAM_BOT_TOKEN
  chat_id_env: TELEGRAM_CHAT_ID

visual_rules:
  avoid:
    - cheap finance influencer style
    - candlestick chart background
    - red green stock movement colors
    - gold coin
    - bull bear illustration
    - noisy trading dashboard

design_prompt:
  principles:
    - "Xiaohongshu thumbnail strength: one clear focal object, fast visual read, high contrast hierarchy"
    - "editorial hierarchy, not decorative wallpaper"
    - "large negative space for Chinese typography, but with a visibly designed technology scene"
    - "asymmetric composition with a strong right-side sci-tech focal structure"
    - "high trust, research-lab calm, premium technology publication"
    - "finance audience credibility without stock-market cliches"
    - "subtle narrative difference between cover, problem, role, boundary, loop, restraint, and next-step pages"
  materials:
    - "matte paper grain"
    - "frosted translucent glass planes"
    - "soft architectural shadows"
    - "thin blueprint hairlines"
    - "visible technical grid with depth"
    - "dimensional layered depth"
    - "glassmorphism interface planes"
    - "electric-blue optical traces"

content:
  hashtags:
    - "#交易Agent"
    - "#AI工作流"
    - "#量化交易"
    - "#个人知识系统"
    - "#自动化"
  style:
    voice: "第一人称、克制、具体、少口号"
    avoid:
      - "赋能"
      - "降本增效"
      - "多维度"
      - "深度解析"
      - "建议收藏"
      - "干货满满"
